# Wiki publish leg: SSOT (main) -> GitHub Wiki.
#
# Fires on any *.md change pushed to main and mirrors content into the wiki. Uses
# GITHUB_TOKEN so the wiki push does NOT recursively trigger the reconcile
# (gollum) workflow — GitHub suppresses workflow triggers from GITHUB_TOKEN
# actions. Combined with commit-only-if-changed and the [skip-reconcile] marker,
# the SSOT<->wiki loop cannot cycle.
#
# If GITHUB_TOKEN ever can't push the wiki, add a fine-grained PAT with wiki
# (contents) write as secret WIKI_SYNC_TOKEN and swap it in below.
name: Wiki publish (SSOT to wiki)

on:
  push:
    branches: [main]
    paths: ['**/*.md']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync        # serialize with the reconcile leg
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SSOT
        uses: actions/checkout@v4
        with: { path: ssot, fetch-depth: 0 }

      - name: Clone wiki (skip gracefully if not initialized)
        id: wiki
        env: { TOKEN: ${{ secrets.WIKI_SYNC_TOKEN || secrets.GITHUB_TOKEN }} }
        run: |
          if git clone "https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Wiki not initialized. Create the first page at ${{ github.server_url }}/${{ github.repository }}/wiki, then re-run this workflow."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror SSOT -> wiki
        if: steps.wiki.outputs.exists == 'true'
        run: SSOT=ssot WIKI=wiki bash ssot/scripts/wiki_sync.sh publish

      - name: Commit + push if changed
        if: steps.wiki.outputs.exists == 'true'
        working-directory: wiki
        run: |
          git config user.name  "gdvp-sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already up to date."
          else
            git commit -m "Sync from main@${GITHUB_SHA::7} [skip-reconcile]"
            git push
          fi
